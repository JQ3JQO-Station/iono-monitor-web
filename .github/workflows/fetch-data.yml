name: Fetch Iono Data

on:
  schedule:
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [fetch]

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch data
        run: node scripts/fetch-data.js

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet && echo "No changes" || (git commit -m "data: update $(date -u +%H:%M)" && git push)
