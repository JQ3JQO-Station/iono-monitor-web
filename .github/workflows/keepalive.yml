name: Keepalive

# スケジュールされたワークフローがGitHubに停止されないよう毎週再有効化する

on:
  schedule:
    - cron: '0 0 * * 0'  # 毎週日曜 00:00 UTC (09:00 JST)
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Re-enable fetch-data workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.enableWorkflow({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'fetch-data.yml'
            });
            console.log('fetch-data.yml re-enabled');
