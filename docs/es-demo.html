<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Es デモ再生 2026-05-24</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #edf1f7;
      color: #1a2838;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    header { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
    header h1 { font-size: 1rem; font-weight: 700; color: #1a3050; }
    .badge { background: #0070d0; color: #fff; font-size: 0.58rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
    .qth-bar { font-size: 0.65rem; color: #6070a0; background: #fff; border-radius: 8px; padding: 6px 10px; }

    /* time slider */
    .time-section {
      background: #fff; border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,20,60,0.10);
      padding: 10px 12px;
    }
    .time-row { display: flex; align-items: center; gap: 8px; }
    #time-display { font-size: 1.3rem; font-weight: 800; color: #1a3050; min-width: 90px; }
    #play-btn {
      background: #3a7bd5; color: #fff; border: none;
      border-radius: 8px; padding: 8px 18px;
      font-size: 0.85rem; font-weight: 700; cursor: pointer;
    }
    #play-btn:active { background: #1a5ba5; }
    input[type=range] { flex: 1; cursor: pointer; }
    .time-note { font-size: 0.58rem; color: #a0b0c8; margin-top: 4px; }

    /* raw values strip */
    .raw-strip {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;
    }
    .raw-cell {
      background: #fff; border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,20,60,0.08);
      padding: 7px 4px; text-align: center;
      border-top: 3px solid #d0d8e8;
      transition: border-color 0.4s;
    }
    .raw-name { font-size: 0.5rem; color: #8090a8; margin-bottom: 2px; }
    .raw-val  { font-size: 1.3rem; font-weight: 800; line-height: 1; transition: color 0.4s; }
    .raw-unit { font-size: 0.42rem; color: #8090a8; }

    /* regional list */
    .region-section {
      background: #fff; border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,20,60,0.10);
      padding: 10px 12px;
    }
    .section-title { font-size: 0.58rem; font-weight: 700; color: #8090a8; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; }
    .region-list { display: flex; flex-direction: column; gap: 6px; }
    .region-row {
      display: flex; align-items: center;
      border-radius: 8px; padding: 8px 10px; gap: 8px;
      transition: background 0.4s;
    }
    .rr-badge { font-size: 1.1rem; min-width: 28px; text-align: center; }
    .rr-name  { font-size: 0.85rem; font-weight: 700; flex: 1; }
    .rr-dist  { font-size: 0.58rem; color: #8090a8; }
    .rr-fxes  { font-size: 0.72rem; font-weight: 700; min-width: 55px; text-align: right; }

    .status-open    { background: #dcfce7; }
    .status-soon    { background: #fef9c3; }
    .status-weak    { background: #f0f4fa; }
    .status-near    { background: #fdf2f2; }
    .status-inactive{ background: #f3f4f6; color: #9ca3af; }

    /* map section */
    .map-section {
      background: #fff; border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,20,60,0.10);
      padding: 10px 12px;
    }
    .map-title { font-size: 0.72rem; font-weight: 600; color: #5060a0; margin-bottom: 8px; }
    .map-wrapper { position: relative; width: 100%; aspect-ratio: 1; margin: 0 auto; }
    .map-wrapper svg { width: 100%; height: 100%; display: block; overflow: visible; }
    .island { fill: rgba(80,150,60,0.13); stroke: #60a840; stroke-width: 3px; stroke-linecap: round; stroke-linejoin: round; }

    /* halo pulse animation */
    @keyframes halo-pulse {
      0%   { transform: scale(1);   opacity: 0.50; }
      65%  { transform: scale(3.2); opacity: 0;    }
      100% { transform: scale(3.2); opacity: 0;    }
    }
    .halo-ring {
      transform-box: fill-box;
      transform-origin: center;
      animation: halo-pulse 1.8s ease-out infinite;
    }

    /* strong sector pulse */
    @keyframes sector-pulse {
      0%,100% { opacity: 0.9; }
      50%     { opacity: 1;   }
    }
    .sector-strong {
      animation: sector-pulse 2s ease-in-out infinite;
    }

  </style>
</head>
<body>
  <header>

    <span class="badge">2026-05-24</span>
  </header>

  <div class="qth-bar">

        <rect class="island" x="100.14" y="338.81" width="87.94" height="42.12" rx="3.75" ry="3.75"/>
        <path class="island" d="M373.42,157.68v166.51c0,3.35-2.72,6.06-6.06,6.06h-21.09c-3.35,0-6.06,2.72-6.06,6.06v12.93c0,3.35-2.72,6.06-6.06,6.06h-72.33c-3.35,0-6.06,2.72-6.06,6.06v12.93c0,3.35-2.72,6.06-6.06,6.06h-42.77c-3.35,0-6.06-2.72-6.06-6.06v-41.64c0-3.35-2.72-6.06-6.06-6.06h-88.66c-3.35,0-6.06-2.72-6.06-6.06v-51.5c0-3.35,2.72-6.06,6.06-6.06h143.83c3.35,0,6.06-2.72,6.06-6.06v-37.98c0-3.35,2.72-6.06,6.06-6.06h29.26c3.35,0,6.06-2.72,6.06-6.06v-76.55c0-3.35,2.72-6.06,6.06-6.06h63.88c3.35,0,6.06,2.72,6.06,6.06v27.44Z"/>
        <path class="island" d="M357.94,2h56.11c4.77,0,8.64,3.87,8.64,8.64v83.23c0,4.77-3.87,8.64-8.64,8.64h-75.98c-2.24,0-4.4.87-6.01,2.43l-3.7,3.59c-1.61,1.56-3.76,2.43-6.01,2.43h-15.74c-4.77,0-8.64-3.87-8.64-8.64V10.64c0-4.77,3.87-8.64,8.64-8.64h51.33Z"/>

        <!-- Skip zone: donut fill between 450km(r=86) and 1400km(r=267) -->

                 M 209,225 A 86,86 0 1,0 209,397 A 86,86 0 1,0 209,225 Z"/>

        <text x="80"  y="378" font-size="10.5" fill="#6070a0" id="slbl-yg" stroke="rgba(255,255,255,0.85)" stroke-width="3" paint-order="stroke">鹿児島</text>

  <!-- regional status -->
  <div class="region-section">
    <div class="section-title">大阪からの交信チャンス</div>

      <!-- rendered by JS -->

  <script>
    // Historical data: 2026-05-24 10:00-12:00 JST (= 01:00-03:00 UTC)
    const HISTORY = [
      { ts:'10:00', ok:4.58,  yg:3.78,  to:7.74, wk:4.94 },
      { ts:'10:15', ok:4.62,  yg:4.06,  to:8.90, wk:4.86 },
      { ts:'10:30', ok:4.66,  yg:3.62,  to:7.90, wk:4.82 },
      { ts:'10:45', ok:4.22,  yg:8.26,  to:null, wk:4.18 },
      { ts:'11:00', ok:5.42,  yg:5.34,  to:null, wk:4.18 },
      { ts:'11:15', ok:3.86,  yg:7.58,  to:null, wk:4.10 },
      { ts:'11:30', ok:3.98,  yg:7.90,  to:5.90, wk:4.10 },
      { ts:'11:45', ok:3.98,  yg:8.18,  to:8.70, wk:4.30 },
      { ts:'12:00', ok:4.46,  yg:11.58, to:6.98, wk:5.90 },
    ];

    // Regions: each linked to an ionosonde station as proxy
    // Distances and bearings from 大阪 (34.7°N, 135.5°E)
    const REGIONS = [
      { name:'九州・南西',   station:'yg', dist:560,  dir:'西南西' },
      { name:'南西諸島',     station:'ok', dist:1060, dir:'南西' },
      { name:'関東・東日本', station:'to', dist:400,  dir:'東' },
      { name:'北海道・東北', station:'wk', dist:1250, dir:'北東' },
    ];

    // Skip zone for 大阪: approx 450-1400km is reachable via single-hop Es
    const SKIP_MIN = 450;
    const SKIP_MAX = 1400;

    const NARRATIVES = [
      '東京方面（TO）のFxEsが7.7MHzで活発。大阪から400kmは近すぎてスキップに乗りにくいが、九州・北海道は今のところ静かな状態。',
      '東京のFxEsが8.9MHzに上昇！ 鹿児島・北海道はまだ低調。東日本で強いEsが出ているが、大阪からは距離が近すぎてスキップが難しい状況。',
      '東京が7.9MHzで継続中。他の局はまだ動きが少ない。大阪から見ると「東向きはまだそろそろ」の状態が続く。',
      '東京のEsが突然消えた！ 代わりに鹿児島が8.3MHzに急上昇。\nEs雲が南西に移動した可能性。大阪から560kmの九州方面が ✅チャンス に変わった！',
      '鹿児島が5.3MHzに落ち着いてきた。東京は引き続き観測なし。九州方面はまだ弱いEsが継続。',
      '鹿児島が再び7.6MHzに上昇。九州方面のEsが再活性化してきた。大阪からのチャンス継続中！',
      '鹿児島7.9MHz、東京も5.9MHzで復活。九州・東日本の両方にEsが出ている状況。九州方面は引き続きチャンス。',
      '鹿児島8.2MHz、東京8.7MHzと両局が同時に強い！ 広域Esの可能性。北海道も少し上がりはじめた（4.3MHz）。そろそろ北向きも？',
      '鹿児島が11.6MHzに急増！ 今日最大値。東京も7.0MHz、北海道も5.9MHzと全局上昇中。\nEs盛期。九州 ✅✅ 強烈チャンス、北海道方面も 🟠そろそろ！',
    ];

    // Station SVG positions and distances from Osaka
    const STN_SVG = {
      ok: { x: 146.5, y: 117.7 },
      yg: { x:  73.9, y: 385.0 },
      to: { x: 329.9, y: 289.8 },
      wk: { x: 333.4, y:  51.8 },
    };
    const OX = 209, OY = 311; // Osaka SVG position

    function fxVal(v) {
      if (v === null || v === undefined) return 0;
      if (typeof v === 'string') return v === '--' ? 0 : (parseFloat(v) || 0);
      return v;
    }

    function esColor(v) {
      if (v <= 0)  return '#a0b0c8';
      if (v < 5)   return '#0098c0';
      if (v < 7)   return '#2a9030';
      if (v < 9)   return '#b08000';
      if (v < 14)  return '#c05000';
      return '#c02020';
    }

    function esBorderColor(v) {
      if (v <= 0) return '#d0d8e8';
      return esColor(v);
    }

    function regionStatus(v, dist) {
      if (dist < SKIP_MIN) {
        // Too close: borderline
        if (v >= 7) return { cls:'status-near', badge:'↔', label:'近い（スキップ外ぎわ）' };
        return { cls:'status-inactive', badge:'─', label:'近すぎ' };
      }
      if (dist > SKIP_MAX) {
        if (v >= 9) return { cls:'status-soon', badge:'🟠', label:'遠いがEsが強い' };
        return { cls:'status-inactive', badge:'─', label:'遠すぎ' };
      }
      // In sweet spot
      if (v >= 9)  return { cls:'status-open',  badge:'✅✅', label:'強烈チャンス' };
      if (v >= 7)  return { cls:'status-open',  badge:'✅',  label:'チャンス' };
      if (v >= 5)  return { cls:'status-soon',  badge:'🟠', label:'そろそろ' };
      if (v >= 3)  return { cls:'status-weak',  badge:'・', label:'弱い' };
      return { cls:'status-inactive', badge:'─', label:'静穏' };
    }

    const SVG_NS = 'http://www.w3.org/2000/svg';

    // Geographic bearing from Osaka to each station (clockwise from North)
    const OSAKA_LAT = 34.7, OSAKA_LON = 135.5;
    const STN_GEO = {
      ok: { lat: 26.7, lon: 127.9 },
      yg: { lat: 31.2, lon: 130.4 },
      to: { lat: 35.7, lon: 140.1 },
      wk: { lat: 45.4, lon: 141.7 },
    };
    function geoBearing(lat1, lon1, lat2, lon2) {
      const r = Math.PI / 180;
      const φ1 = lat1*r, φ2 = lat2*r, Δλ = (lon2-lon1)*r;
      const y = Math.sin(Δλ) * Math.cos(φ2);
      const x = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
      return (Math.atan2(y, x) * 180/Math.PI + 360) % 360;
    }
    // Pre-compute SVG angles (geographic bearing → SVG: -90° because SVG x-right = East = bearing 90°)
    const STN_ANGLE = {};
    for (const [k, g] of Object.entries(STN_GEO)) {
      STN_ANGLE[k] = geoBearing(OSAKA_LAT, OSAKA_LON, g.lat, g.lon) - 90;
    }

    // Draw a donut sector from rIn to rOut, centered at angleDeg ± halfDeg
    function sectorPath(cx, cy, rIn, rOut, angleDeg, halfDeg) {
      const r = Math.PI / 180;
      const a1 = (angleDeg - halfDeg) * r, a2 = (angleDeg + halfDeg) * r;
      const f = (v) => v.toFixed(2);
      const xi1 = cx + rIn*Math.cos(a1),  yi1 = cy + rIn*Math.sin(a1);
      const xi2 = cx + rIn*Math.cos(a2),  yi2 = cy + rIn*Math.sin(a2);
      const xo1 = cx + rOut*Math.cos(a1), yo1 = cy + rOut*Math.sin(a1);
      const xo2 = cx + rOut*Math.cos(a2), yo2 = cy + rOut*Math.sin(a2);
      return `M ${f(xi1)},${f(yi1)} A ${rIn},${rIn} 0 0,1 ${f(xi2)},${f(yi2)} L ${f(xo2)},${f(yo2)} A ${rOut},${rOut} 0 0,0 ${f(xo1)},${f(yo1)} Z`;
    }

    function esColorCloud(v) {
      if (v < 3)  return null;
      if (v < 5)  return '#0090c8';
      if (v < 7)  return '#28a838';
      if (v < 9)  return '#d09000';
      if (v < 14) return '#d05000';
      return '#c02020';
    }

    function renderMap(vals) {
      // Clear dynamic groups
      const halosGroup   = document.getElementById('stn-halos');
      const cloudsGroup  = document.getElementById('es-clouds');
      const sectorsGroup = document.getElementById('stn-sectors');
      halosGroup.innerHTML   = '';
      cloudsGroup.innerHTML  = '';
      sectorsGroup.innerHTML = '';

      // Remove old radial gradient defs
      const svgDefs = document.querySelector('#es-map defs');
      svgDefs.querySelectorAll('[id^="cg-"]').forEach(el => el.remove());

      // --- Weather-radar clouds ---
      for (const r of REGIONS) {
        const k   = r.station;
        const v   = vals[k];
        const s   = STN_SVG[k];
        const col = esColorCloud(v);
        if (!col || v < 3) continue;
        const radius = Math.min(110, 35 + v * 6);
        const gradId = 'cg-' + k;
        const grad = document.createElementNS(SVG_NS, 'radialGradient');
        grad.setAttribute('id', gradId);
        grad.setAttribute('cx', '50%'); grad.setAttribute('cy', '50%');
        grad.setAttribute('r',  '50%');
        const stops = [
          { offset:'0%',   color: col, opacity: Math.min(0.75, 0.35 + v * 0.04) },
          { offset:'55%',  color: col, opacity: Math.min(0.45, 0.15 + v * 0.025) },
          { offset:'100%', color: col, opacity: 0 },
        ];
        stops.forEach(({ offset, color, opacity }) => {
          const stop = document.createElementNS(SVG_NS, 'stop');
          stop.setAttribute('offset', offset);
          stop.setAttribute('stop-color', color);
          stop.setAttribute('stop-opacity', opacity);
          grad.appendChild(stop);
        });
        svgDefs.appendChild(grad);
        const circ = document.createElementNS(SVG_NS, 'circle');
        circ.setAttribute('cx', s.x); circ.setAttribute('cy', s.y);
        circ.setAttribute('r',  radius);
        circ.setAttribute('fill', `url(#${gradId})`);
        cloudsGroup.appendChild(circ);
      }

      for (const r of REGIONS) {
        const k      = r.station;
        const v      = vals[k];
        const s      = STN_SVG[k];
        const inZone = r.dist >= SKIP_MIN && r.dist <= SKIP_MAX;
        const active = inZone && v >= 5;
        const chance = inZone && v >= 7;

        // --- Station dot ---
        const dot = document.getElementById('sdot-' + k);
        const dotR = v > 0 ? Math.min(28, 6 + v * 1.8) : 6;
        dot.setAttribute('r', dotR);
        dot.setAttribute('fill', esColor(v));
        dot.setAttribute('opacity', v > 0 ? '1' : '0.30');
        dot.setAttribute('filter', active ? 'url(#stn-glow)' : '');

        // --- Pulsing halos (2 rings, staggered) ---
        if (active) {
          const delays = [0, 0.7];
          delays.forEach((delay, i) => {
            const halo = document.createElementNS(SVG_NS, 'circle');
            halo.setAttribute('cx', s.x);
            halo.setAttribute('cy', s.y);
            halo.setAttribute('r', dotR * 1.5);
            halo.setAttribute('fill', esColor(v));
            halo.setAttribute('opacity', '0.5');
            halo.classList.add('halo-ring');
            halo.style.animationDelay = delay + 's';
            halosGroup.appendChild(halo);
          });
        }

        // --- Labels ---
        const lbl = document.getElementById('slbl-' + k);
        lbl.setAttribute('fill', active ? esColor(v) : '#8090a8');
        lbl.setAttribute('font-weight', chance ? 'bold' : 'normal');

        const mhz = document.getElementById('smhz-' + k);
        mhz.textContent = v > 0 ? v.toFixed(1) + ' MHz' : '';
        mhz.setAttribute('fill', esColor(v));

        // --- Directional sector in skip zone (blurred, weather-radar style) ---
        if (active) {
          const d = sectorPath(OX, OY, 86, 267, STN_ANGLE[k], 28);
          const sec = document.createElementNS(SVG_NS, 'path');
          sec.setAttribute('d', d);
          sec.setAttribute('fill', esColor(v));
          sec.setAttribute('opacity', Math.min(0.80, 0.35 + v * 0.055));
          sec.setAttribute('filter', 'url(#sector-blur)');
          if (v >= 9 && inZone && chance) {
            sec.classList.add('sector-strong');
          }
          sectorsGroup.appendChild(sec);

          // Sharp overlay for strong sectors (v >= 9)
          if (v >= 9 && inZone && chance) {
            const secSharp = document.createElementNS(SVG_NS, 'path');
            secSharp.setAttribute('d', d);
            secSharp.setAttribute('fill', esColor(v));
            secSharp.setAttribute('opacity', '0.30');
            secSharp.classList.add('sector-strong');
            sectorsGroup.appendChild(secSharp);
          }
        }
      }
    }

    function render(idx) {
      const d = HISTORY[idx];
      const vals = { ok: fxVal(d.ok), yg: fxVal(d.yg), to: fxVal(d.to), wk: fxVal(d.wk) };

      // Time display
      document.getElementById('time-display').textContent = d.ts + ' JST';

      // Raw cells
      for (const [k, v] of Object.entries(vals)) {
        const el = document.getElementById('rv-' + k);
        el.textContent = v > 0 ? v.toFixed(2) : '--';
        el.style.color = esColor(v);
        document.getElementById('cell-' + k).style.borderTopColor = esBorderColor(v);
      }

      // Map
      renderMap(vals);

      // Regional list
      const listEl = document.getElementById('region-list');
      listEl.innerHTML = '';
      for (const r of REGIONS) {
        const v   = vals[r.station];
        const st  = regionStatus(v, r.dist);
        const row = document.createElement('div');
        row.className = 'region-row ' + st.cls;
        row.innerHTML = `
          <span class="rr-badge">${st.badge}</span>
          <span class="rr-name">${r.name}</span>
          <span class="rr-dist">${r.dir} ${r.dist}km</span>
          <span class="rr-fxes" style="color:${esColor(v)}">${v > 0 ? v.toFixed(1)+'MHz' : '─'}</span>
        `;
        listEl.appendChild(row);
      }

    }

    // Slider + play
    const slider  = document.getElementById('slider');
    const playBtn = document.getElementById('play-btn');
    let timer = null;
    let playing = false;

    slider.addEventListener('input', () => {
      render(parseInt(slider.value));
    });

    playBtn.addEventListener('click', () => {
      if (playing) {
        clearInterval(timer);
        playing = false;
        playBtn.textContent = '▶ 再生';
        return;
      }
      playing = true;
      playBtn.textContent = '⏸ 停止';
      let idx = parseInt(slider.value);
      if (idx >= HISTORY.length - 1) { idx = 0; slider.value = 0; }

      timer = setInterval(() => {
        idx++;
        slider.value = idx;
        render(idx);
        if (idx >= HISTORY.length - 1) {
          clearInterval(timer);
          playing = false;
          playBtn.textContent = '▶ 再生';
        }
      }, 1800);
    });

    render(0);
  </script>
</body>
</html>
