<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Es 影響圏マップ</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #edf1f7;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
      gap: 8px;
    }
    header {
      width: 390px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }
    header h1 { font-size: 1rem; font-weight: 700; color: #1a3050; }
    .badge {
      background: #d04000; color: #fff;
      font-size: 0.58rem; font-weight: 700;
      padding: 2px 8px; border-radius: 10px;
    }

    #map-container {
      width: 390px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,20,60,0.10);
      overflow: hidden;
    }
    #map-container svg {
      display: block;
    }

    .land {
      fill: rgba(80,150,60,0.10);
      stroke: #60a840;
      stroke-width: 1.2;
      stroke-linejoin: round;
    }
    .stn-dot {
      fill: #0070d0;
      stroke: #fff;
      stroke-width: 1.5;
    }
    .stn-label {
      font-size: 11px;
      font-weight: 700;
      fill: #1a3050;
      paint-order: stroke;
      stroke: rgba(255,255,255,0.9);
      stroke-width: 3;
    }
  </style>
</head>
<body>
  <header>
    <h1>Es 影響圏マップ</h1>
    <span class="badge">● LIVE</span>
  </header>

  <div id="map-container">
    <svg id="map" width="390" height="700"></svg>
  </div>

  <script>
    const W = 390, H = 700;

    const STATIONS = [
      { id: 'wk', name: '稚内',    lat: 45.4, lon: 141.7 },
      { id: 'to', name: '国分寺',  lat: 35.7, lon: 139.5 },
      { id: 'yg', name: '山川',    lat: 31.2, lon: 130.6 },
      { id: 'ok', name: '大宜味',  lat: 26.6, lon: 128.2 },
    ];

    // 北海道東端(145.8°E)がキャンバス右端に収まるスケール上限 ≈ 946
    // 余白を持たせて scale=900, 回転 -13.7°（時計回り）
    const projection = d3.geoEquirectangular()
      .scale(900)
      .center([131.4, 34.2])
      .translate([W / 2, H / 2])
      .angle(-13.7);

    const geoPath = d3.geoPath().projection(projection);
    const svg = d3.select('#map');

    // 地図読み込み・描画
    d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json')
      .then(world => {
        const countries = topojson.feature(world, world.objects.countries);
        // Japan = 392, Taiwan = 158
        const targets = countries.features.filter(d => [392, 158].includes(+d.id));

        // 国土輪郭
        svg.selectAll('path.land')
          .data(targets)
          .join('path')
          .attr('class', 'land')
          .attr('d', geoPath);

        // 観測点ドット
        svg.selectAll('circle.stn-dot')
          .data(STATIONS)
          .join('circle')
          .attr('class', 'stn-dot')
          .attr('cx', d => projection([d.lon, d.lat])[0])
          .attr('cy', d => projection([d.lon, d.lat])[1])
          .attr('r', 5);

        // 観測点ラベル
        svg.selectAll('text.stn-label')
          .data(STATIONS)
          .join('text')
          .attr('class', 'stn-label')
          .attr('x', d => projection([d.lon, d.lat])[0] + 8)
          .attr('y', d => projection([d.lon, d.lat])[1] + 4)
          .text(d => d.name);
      })
      .catch(e => {
        svg.append('text')
          .attr('x', W / 2).attr('y', H / 2)
          .attr('text-anchor', 'middle')
          .attr('fill', '#c05000')
          .text('地図データ読み込み失敗');
        console.error(e);
      });
  </script>
</body>
</html>
